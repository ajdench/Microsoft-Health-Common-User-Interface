name: Deploy Pages bundle to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: requirements-mkdocs.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            msh-cui-wiki/package-lock.json
            prototypes/ehr-shadcn-pwa/package-lock.json

      - name: Install MkDocs
        run: python -m pip install -r requirements-mkdocs.txt

      - name: Build Pages bundle
        env:
          PAGES_SITE_ORIGIN: https://${{ github.repository_owner }}.github.io
          REPO_BASE_PATH: /${{ github.event.repository.name }}/
          MKDOCS_BASE_PATH: /${{ github.event.repository.name }}/mkdocs_wiki/
          STARLIGHT_BASE_PATH: /${{ github.event.repository.name }}/starlight_wiki/
          DEMO_BASE_PATH: /${{ github.event.repository.name }}/demo/
        run: bash scripts/build_github_pages_bundle.sh site

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
